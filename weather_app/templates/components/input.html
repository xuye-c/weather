<!-- Bootstrap Modal -->
<div class="modal fade" id="inputModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <!-- header -->
      <div class="modal-header">
        <h5 class="modal-title">{{ msg.get('ui.new_record') }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- body -->
      <div class="modal-body">
        <form id="input-form">
          <div class="mb-2">
            <label>{{ msg.get('ui.city') }}</label>
            <input type="text" name="city" id="input-city" class="form-control" required>
          </div>

          <div class="mb-2">
            <label>{{ msg.get('ui.date') }}</label>
            <input type="date" name="date" id="input-date" class="form-control" required>
          </div>

          <div class="mb-2">
            <label>{{ msg.get('ui.temperature') }}</label>
            <input type="number" name="temperature" id="input-temp" class="form-control" step="0.1" required>
          </div>
        </form>
      </div>

      <!-- footer -->
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{ msg.get('ui.cancel') }}</button>
        <button type="button" id="save-btn" class="btn btn-primary">{{ msg.get('ui.save') }}</button>
      </div>

    </div>
  </div>
</div>
<script>
    document.getElementById("save-btn").addEventListener("click", function() {
    const form = document.getElementById("input-form");
    const formData = new FormData(form);

    const data = {
        city: formData.get("city"),
        date: formData.get("date"),
        temperature: formData.get("temperature")
    };

    const mode = this.dataset.mode || "insert";

    const url = mode === "edit" ? "/update" : "/insert";

    fetch(url, {
        method: "POST",
        body: new URLSearchParams(data)
    })
    .then(res => res.text())
    .then(msg => {
        console.log(msg);

        const modal = bootstrap.Modal.getInstance(document.getElementById('inputModal'));
        modal.hide();

        // 刷新页面（简单粗暴）
        location.reload();
        });
    });
    function openEditModal(city, date, temp) {
        document.getElementById("input-city").value = city;
        document.getElementById("input-date").value = date;
        document.getElementById("input-temp").value = temp;

        // 禁止修改 city + date
        document.getElementById("input-city").disabled = true;
        document.getElementById("input-date").disabled = true;

        const modal = new bootstrap.Modal(document.getElementById('inputModal'));
        modal.show();

        // 标记是 edit 模式
        document.getElementById("save-btn").dataset.mode = "edit";
    }
</script>

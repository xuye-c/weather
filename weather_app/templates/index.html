{% extends "base.html" %}

{% block title %}首页{% endblock %}

{% block body %}
<div class="container-fluid layout-container position-relative">
  <!-- 左上角工具栏 -->
    <div class="tool-bar d-flex align-items-center gap-2">
    
    <!-- 新建按钮 -->
    <button id="new-btn" class="btn btn-primary btn-sm" type="button" title="新建">
        {{ msg.get("ui.new") }}
    </button>

    <!-- 搜索表单（放右边） -->
    <form id="search-form" class="d-flex gap-2 mb-0">
        <input type="text" name="city" placeholder="{{ msg.get('ui.city_placeholder') }}" class="form-control form-control-sm" required>
        <input type="date" name="{{ msg.get('ui.start_date') }}" class="form-control form-control-sm">
        <input type="date" name="{{ msg.get('ui.end_date') }}" class="form-control form-control-sm">
        <button type="submit" class="btn btn-success btn-sm" style="min-width: 80px;">{{ msg.get('ui.search') }}</button>
    </form>

    <select id="lang-switch" class="form-select form-select-sm" style="width:120px;">
        {% for lang in languages %}
            <option value="{{ lang }}" {% if lang == current_lang %}selected{% endif %}>
                {{ lang }}
            </option>
        {% endfor %}
    </select>


    </div>

  <div class="row" style="height: calc(100vh - 20px);">
    <!-- 左侧：Result 区，宽 2/3 -->
    <div class="col-12 col-lg-8 d-flex flex-column" style="padding-top: 50px;">
      <div class="flex-grow-1 border rounded bg-white p-3" id="result-area">
        {% include "components/result.html" %}
      </div>
    </div>

    <!-- 右侧：legend 上，terminal 下，1/3 宽度，legend:terminal = 2:1 -->
    <div class="col-12 col-lg-4 d-flex flex-column" style="padding-top: 50px; height: calc(100vh - 20px);">
        <!-- legend 占 2/3 高度 -->
        <div class="border rounded bg-white mb-2 p-3" id="legend-area" style="flex: 2; min-height: 0; overflow: auto;">
            {% include "components/legend.html" %}
        </div>
        <!-- terminal 占 1/3 高度 -->
        <div class="border rounded bg-white p-3" id="terminal-area" style="flex: 1; min-height: 0; overflow: auto;">
            {% include "components/terminal.html" %}
        </div>
    </div>
  </div>
</div>

<script>
const messages = JSON.parse('{{ msg._messages | tojson | safe }}');

// 辅助函数：获取消息
function getMessage(key, params = {}) {
    let value = messages;
    const keys = key.split('.');
    
    for (const k of keys) {
        if (value && value[k] !== undefined) {
            value = value[k];
        } else {
            return key; // 返回 key 作为 fallback
        }
    }
    
    if (typeof value === 'string' && params) {
        // 简单的模板替换
        return value.replace(/{(\w+)}/g, (match, param) => params[param] || match);
    }
    
    return value || key;
}

document.getElementById("lang-switch").addEventListener("change", function () {
    const lang = this.value;

    fetch("/set_language", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ lang: lang })
    })
    .then(() => location.reload());
});
document.getElementById("new-btn").addEventListener("click", function() {
    const modal = new bootstrap.Modal(document.getElementById('inputModal'));
    modal.show();
});
document.getElementById("search-form").addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    fetch("/search", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        console.log("FULL DATA:", data);
        // ===== 更新天气区域 =====
        const db = data.db;
        const weather = data.weather;
        const weatherArea = document.getElementById("weather-area");

        if (!data.weather) {
            weatherArea.innerHTML = "<p>No weather data.</p>";
        } else {
            if (!weather || weather.status !== "success") {
                weatherArea.innerHTML = "<p>No weather data.</p>";
            } else {
                const w = weather.data;
                weatherArea.innerHTML = `
                    <div>
                        <strong>${w.city}</strong><br>
                        Temp: ${w.temp} °C<br>
                        ${w.weather}<br>
                        Humidity: ${w.humidity}%
                    </div>
                `;
            }
        }
        const resultArea = document.getElementById("result-area");
        if (db.status === "error") {
            resultArea.innerHTML = `<p class="text-danger">${db.message}</p>`;
            return;
        }

        if (!db.data || db.data.length === 0) {
            resultArea.innerHTML = "<p>No data found.</p>";
            return;
        }

        // 渲染列表
        let html = "<h5 class='mb-3'>{{msg.get('ui.result_title')}}</h5><ul class='list-group'>";

        db.data.forEach(item => {
            html += `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                
                    <div>
                        <strong>${item.date}</strong> -- > ${item.temperature} °C
                    </div>

                    <div class="btn-group btn-group-sm">
                        <button 
                            class="btn btn-warning edit-btn"
                            data-city="${item.city}"
                            data-date="${item.date}"
                            data-temp="${item.temperature}">
                            ${getMessage("ui.edit")}
                        </button>

                        <button 
                            class="btn btn-danger delete-btn"
                            data-city="${item.city}"
                            data-date="${item.date}">
                            ${getMessage("ui.delete")}
                        </button>
                    </div>

                </li>
                `;
        });

        html += "</ul>";

        resultArea.innerHTML = html;
        // 绑定 edit
        document.querySelectorAll(".edit-btn").forEach(btn => {
            btn.addEventListener("click", function () {
                const city = this.dataset.city;
                const date = this.dataset.date;
                const temp = this.dataset.temp;

                openEditModal(city, date, temp);
            });
        });

        // 绑定 delete
        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.addEventListener("click", function () {
                const city = this.dataset.city;
                const date = this.dataset.date;
                handleDelete(city, date);
            });                               
        });
    });
    function handleDelete(city, date) {
    if (!confirm(getMessage("ui.confirm_delete", { city, date }))) return;

    fetch("/delete", {
        method: "POST",
        body: new URLSearchParams({ city, date })
    })
    .then(res => res.text())
    .then(msg => {
        console.log(msg);
        location.reload();
    });
}
});
</script>
{% include "components/input.html" %}
{% endblock %}
